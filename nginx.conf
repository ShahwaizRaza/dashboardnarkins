server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://jwww4kkscwo08sc8osw4g4k0-191011561943:5000/;
        proxy_set_header Host $host;
    }

    # Serve frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
